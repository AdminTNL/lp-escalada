<script>
(function () {
  const style = document.createElement('style');
  style.innerHTML = `
    #escalada-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999999;
    }

    .escalada-modal {
      background: #fff;
      max-width: 560px;
      width: calc(100% - 32px);
      padding: 32px 34px;
      border-radius: 12px;
      position: relative;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      box-shadow: 0 20px 50px rgba(0,0,0,0.28);
    }

    .escalada-modal h2 {
      margin: 0 0 14px;
      font-size: 26px;
      font-weight: 700;
    }

    .escalada-modal p {
      margin: 0;
      line-height: 1.5;
      font-size: 18px;
      color: #222;
      font-weight: 600;
    }

    .escalada-modal em {
      font-style: normal;
      font-weight: 600;
    }

    .escalada-close {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      font-size: 26px;
      cursor: pointer;
      color: #777;
      font-weight: 700;
    }

    .escalada-close:hover {
      color: #000;
    }

    @media (max-width: 480px) {
      .escalada-modal {
        padding: 26px 22px;
      }

      .escalada-modal h2 {
        font-size: 22px;
      }

      .escalada-modal p {
        font-size: 16px;
      }
    }
  `;
  document.head.appendChild(style);

  const overlay = document.createElement('div');
  overlay.id = 'escalada-overlay';
  overlay.innerHTML = `
    <div class="escalada-modal">
      <button class="escalada-close" aria-label="Fechar">×</button>
      <h2>Olá! 👋</h2>
      <p>
        2026 chegou e o <strong>Escalada</strong> está passando por muitas mudanças:
        novos prêmios, novas jornadas e novos caminhos pra você continuar crescendo
        rumo à sua melhor versão.
        <br><br>
        <em>
          PS: nossa comunidade continua ativa — fique à vontade pra entrar e conhecer.
        </em>
      </p>
    </div>
  `;
  document.body.appendChild(overlay);

  const close = () => overlay.remove();

  overlay.querySelector('.escalada-close').addEventListener('click', close);
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) close();
  });

  // fecha automaticamente após 30 segundos
  setTimeout(close, 30000);
})();
