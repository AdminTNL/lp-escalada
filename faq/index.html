<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ Escalada Sebrae 2026</title>
  <meta
    name="description"
    content="Carregando a versao remota da FAQ Escalada Sebrae 2026."
  />
  <style>
    :root {
      color-scheme: light;
      --faq-accent: #00d95d;
      --faq-bg-start: #08101d;
      --faq-bg-end: #121a2d;
      --faq-panel: rgba(10, 16, 29, 0.8);
      --faq-text: #ffffff;
      --faq-muted: rgba(255, 255, 255, 0.74);
      --faq-danger: #ff7a7a;
      --faq-border: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body.faq-loading,
    body.faq-error {
      font-family: "Space Grotesk", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0, 217, 93, 0.18), transparent 28%),
        linear-gradient(135deg, var(--faq-bg-start) 0%, var(--faq-bg-end) 100%);
      color: var(--faq-text);
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .faq-status-card {
      width: min(100%, 720px);
      padding: 32px 28px;
      border: 1px solid var(--faq-border);
      border-radius: 24px;
      background: var(--faq-panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24);
    }

    .faq-loader-text {
      position: relative;
      display: inline-block;
      margin: 0;
      padding-left: 22px;
      color: var(--faq-text);
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .faq-loader-text::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--faq-accent);
      box-shadow: 0 0 0 8px rgba(0, 217, 93, 0.14);
      transform: translateY(-50%);
      animation: faq-pulse 1.4s ease-in-out infinite;
    }

    .faq-status-copy {
      margin: 14px auto 0;
      max-width: 46ch;
      color: var(--faq-muted);
      font-size: 15px;
      line-height: 1.6;
    }

    body.faq-error .faq-status-card {
      text-align: left;
    }

    body.faq-error .faq-loader-text {
      color: var(--faq-danger);
      text-transform: none;
      letter-spacing: normal;
      font-size: clamp(24px, 3.4vw, 34px);
    }

    body.faq-error .faq-loader-text::before {
      background: var(--faq-danger);
      box-shadow: 0 0 0 8px rgba(255, 122, 122, 0.14);
    }

    .faq-error-log {
      margin: 18px 0 0;
      padding-left: 18px;
      color: var(--faq-muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .faq-retry-button {
      margin-top: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border: 0;
      border-radius: 999px;
      background: var(--faq-accent);
      color: #08101d;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    @keyframes faq-pulse {
      0%,
      100% {
        transform: translateY(-50%) scale(1);
        opacity: 1;
      }

      50% {
        transform: translateY(-50%) scale(0.8);
        opacity: 0.72;
      }
    }
  </style>
</head>
<body class="faq-loading">
  <main id="faq-status" class="faq-status-card" aria-live="polite">
    <p class="faq-loader-text">Carregando FAQ</p>
    <p class="faq-status-copy">
      Buscando o conteudo remoto do bucket e aplicando os mesmos assets visuais da landing.
    </p>
  </main>

  <script>
    (() => {
      const REMOTE_ORIGIN = "https://database.tnledu.shop";
      const REMOTE_PATH = "/storage/v1/object/public/scripts-escalada/scripts/index-lp.html";
      const FAQ_ROUTE = "/faq/";
      const REMOTE_HEAD_MARKER = "data-faq-remote-head";
      const REMOTE_SCRIPT_MARKER = "data-faq-remote-script";

      function normalizeAssetPath(value) {
        if (!value) {
          return value;
        }

        return value
          .replace(/^\.\/wp-content\//i, "/wp-content/")
          .replace(/^\.\/wp-includes\//i, "/wp-includes/")
          .replace(/^\.\/faq-exata\.html$/i, FAQ_ROUTE);
      }

      function normalizeCssText(value) {
        if (!value) {
          return value;
        }

        return value
          .replace(/(["'(])\.\/wp-content\//gi, "$1/wp-content/")
          .replace(/(["'(])\.\/wp-includes\//gi, "$1/wp-includes/")
          .replace(/(["'(])\.\/faq-exata\.html/gi, `$1${FAQ_ROUTE}`);
      }

      function normalizeHtmlMarkup(value) {
        if (!value) {
          return value;
        }

        return normalizeCssText(value)
          .replace(/href=(['"])\.\/faq-exata\.html\1/gi, `href="${FAQ_ROUTE}"`)
          .replace(/(href|src|srcset)=(['"])\.\/wp-content\//gi, "$1=$2/wp-content/")
          .replace(/(href|src|srcset)=(['"])\.\/wp-includes\//gi, "$1=$2/wp-includes/");
      }

      function setDescription(remoteDocument) {
        const remoteDescription = remoteDocument.querySelector('meta[name="description"]');
        if (!remoteDescription) {
          return;
        }

        let localDescription = document.querySelector('meta[name="description"]');
        if (!localDescription) {
          localDescription = document.createElement("meta");
          localDescription.setAttribute("name", "description");
          document.head.appendChild(localDescription);
        }

        localDescription.setAttribute("content", remoteDescription.getAttribute("content") || "");
      }

      function clearRemoteHeadNodes() {
        document
          .querySelectorAll(`[${REMOTE_HEAD_MARKER}]`)
          .forEach((node) => node.remove());
      }

      function clearRemoteScripts() {
        document
          .querySelectorAll(`script[${REMOTE_SCRIPT_MARKER}]`)
          .forEach((node) => node.remove());
      }

      function syncHead(remoteDocument) {
        clearRemoteHeadNodes();

        document.title = remoteDocument.title || document.title;
        setDescription(remoteDocument);

        const headNodes = remoteDocument.querySelectorAll(
          'head link[rel="icon"], head link[rel="stylesheet"], head style'
        );

        headNodes.forEach((node) => {
          const clone = node.cloneNode(true);
          clone.setAttribute(REMOTE_HEAD_MARKER, "");

          if (clone.tagName === "LINK") {
            clone.href = normalizeAssetPath(clone.getAttribute("href"));
          }

          if (clone.tagName === "STYLE") {
            clone.textContent = normalizeCssText(clone.textContent);
          }

          document.head.appendChild(clone);
        });
      }

      function extractRemoteRoot(remoteDocument) {
        const pageRoot = remoteDocument.querySelector('[data-elementor-type="wp-page"]');
        const wrapper = document.createElement("div");

        if (pageRoot) {
          wrapper.innerHTML = normalizeHtmlMarkup(pageRoot.outerHTML);
          return wrapper.firstElementChild;
        }

        const fragmentHost = document.createElement("div");
        const bodyMarkup = Array.from(remoteDocument.body.childNodes)
          .filter((node) => node.nodeName !== "SCRIPT")
          .map((node) => node.outerHTML || node.textContent || "")
          .join("");

        fragmentHost.innerHTML = normalizeHtmlMarkup(bodyMarkup);
        return fragmentHost;
      }

      function copyBodyAttributes(remoteDocument) {
        const remoteBody = remoteDocument.body;

        Array.from(document.body.attributes).forEach((attribute) => {
          if (attribute.name !== "class") {
            document.body.removeAttribute(attribute.name);
          }
        });

        Array.from(remoteBody.attributes).forEach((attribute) => {
          document.body.setAttribute(attribute.name, attribute.value);
        });
      }

      function renderError(errors) {
        document.body.className = "faq-error";
        document.body.innerHTML = `
          <main class="faq-status-card" aria-live="polite">
            <p class="faq-loader-text">Nao foi possivel carregar o FAQ</p>
            <p class="faq-status-copy">
              A rota abriu, mas o HTML remoto nao conseguiu ser montado com os estilos da landing.
            </p>
            <ul class="faq-error-log">
              ${errors
                .map(
                  (entry) =>
                    `<li><strong>${entry.url}</strong><br>${entry.message}</li>`
                )
                .join("")}
            </ul>
            <button class="faq-retry-button" type="button">Tentar novamente</button>
          </main>
        `;

        const retryButton = document.querySelector(".faq-retry-button");
        if (retryButton) {
          retryButton.addEventListener("click", () => window.location.reload());
        }
      }

      async function fetchRemoteDocument() {
        const url = `${REMOTE_ORIGIN}${REMOTE_PATH}`;

        try {
          const response = await fetch(url, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const html = await response.text();
          if (!html || !html.trim()) {
            throw new Error("Documento remoto vazio.");
          }

          const parsed = new DOMParser().parseFromString(html, "text/html");
          return { url, parsed };
        } catch (error) {
          throw [
            {
              url,
              message: error instanceof Error ? error.message : String(error)
            }
          ];
        }
      }

      async function loadRemoteScripts(remoteDocument) {
        clearRemoteScripts();

        const scripts = Array.from(remoteDocument.querySelectorAll("body script"));

        for (const original of scripts) {
          const script = document.createElement("script");
          script.setAttribute(REMOTE_SCRIPT_MARKER, "");

          Array.from(original.attributes).forEach((attribute) => {
            if (attribute.name === "src") {
              script.setAttribute("src", normalizeAssetPath(attribute.value));
            } else {
              script.setAttribute(attribute.name, attribute.value);
            }
          });

          if (original.src) {
            await new Promise((resolve, reject) => {
              script.addEventListener("load", resolve, { once: true });
              script.addEventListener(
                "error",
                () => reject(new Error(`Falha ao carregar script ${script.src}`)),
                { once: true }
              );
              document.body.appendChild(script);
            });
          } else {
            script.textContent = normalizeCssText(original.textContent || "");
            document.body.appendChild(script);
          }
        }
      }

      async function mountRemoteFaq() {
        const { url, parsed } = await fetchRemoteDocument();
        const root = extractRemoteRoot(parsed);

        syncHead(parsed);
        copyBodyAttributes(parsed);
        document.body.innerHTML = "";
        document.body.appendChild(root);
        await loadRemoteScripts(parsed);

        console.info("[faq-loader] FAQ remoto montado com os assets da landing:", url);
      }

      mountRemoteFaq().catch((errors) => {
        const normalizedErrors = Array.isArray(errors)
          ? errors
          : [
              {
                url: `${REMOTE_ORIGIN}${REMOTE_PATH}`,
                message: errors instanceof Error ? errors.message : String(errors)
              }
            ];

        console.error("[faq-loader] erro ao montar FAQ remoto:", normalizedErrors);
        renderError(normalizedErrors);
      });
    })();
  </script>
</body>
</html>
